# Production Nginx configuration for Hotel Management System
# Frontend: serves static files
# Backend: proxies /api requests to FastAPI
#
# This config supports multiple deployment scenarios:
#   1. HTTP only (default) - for local/VPS/behind reverse proxy/Cloudflare Tunnel
#   2. HTTPS with SSL certificates - uncomment the HTTPS server block below
#   3. Cloudflare Tunnel - use the default HTTP block; Cloudflare handles HTTPS

upstream backend {
    server backend:8000;
}

# =============================================================================
# Scenario A & C: HTTP Server (default)
# =============================================================================
# Use this block for:
#   - Direct HTTP access (e.g., http://localhost or http://your-server-ip)
#   - Behind another reverse proxy or load balancer
#   - Behind Cloudflare Tunnel (HTTPS terminated at Cloudflare's edge)
#
# For Cloudflare Tunnel:
#   - Nginx only needs to listen on HTTP port 80 locally.
#   - HTTPS is terminated at Cloudflare's edge.
#   - No changes needed here; Cloudflare forwards to http://<host>:80.
# =============================================================================

server {
    listen 80;
    server_name ytlau.net hotel.ytlau.net;  # Accept any host header; change to your domain if needed

    server_tokens off;  # Hide nginx version

    # Frontend static files
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_vary on;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;

    # API proxy to backend
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA fallback - serve index.html for all non-file requests
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}

# =============================================================================
# Scenario B: HTTPS Server (Nginx terminates TLS)
# =============================================================================
# To use HTTPS directly through Nginx (without Cloudflare or another proxy):
#
# 1. Obtain SSL certificates (e.g., via Let's Encrypt or another CA).
# 2. Mount the certificate files into the container at /etc/nginx/ssl/.
#    Example docker-compose.prod.yml volume mount:
#      - ./nginx/ssl:/etc/nginx/ssl:ro
# 3. Uncomment the server blocks below.
# 4. Update server_name to your actual domain(s).
# 5. Rebuild and restart: docker compose -f docker-compose.prod.yml up --build -d
#
# For advanced SSL/TLS tuning, refer to the official Nginx documentation:
# https://nginx.org/en/docs/http/configuring_https_servers.html
