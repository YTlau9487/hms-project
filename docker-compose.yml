services:
  # Development service
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        - NODE_ENV=development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - pnpm-store:/pnpm-store
    environment:
      - NODE_ENV=development
    command: sh -c "pnpm dev --host 0.0.0.0 --port 3000"
    restart: unless-stopped

  # Production service
  prod:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    command: HOSTNAME="0.0.0.0" node server.js
    restart: unless-stopped

volumes:
  pnpm-store:
