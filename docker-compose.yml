services:
  # Backend service (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # Development service
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        - NODE_ENV=development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - pnpm-store:/pnpm-store
    environment:
      - NODE_ENV=development
      - DOCKER_ENV=true
    command: sh -c "pnpm dev --host 0.0.0.0 --port 3000"
    restart: unless-stopped

  # Database reset helper (run once to reset DB after schema changes)
  # Usage: docker compose run --rm reset-db
  reset-db:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - backend-data:/app/data
    entrypoint: ["sh", "-c", "rm -f /app/data/hotel.db && python seed.py && echo 'Database reset complete!'"]
    profiles:
      - tools

volumes:
  pnpm-store:
  backend-data:
